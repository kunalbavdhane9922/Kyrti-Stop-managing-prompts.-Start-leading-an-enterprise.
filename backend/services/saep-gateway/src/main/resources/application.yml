server:
  port: ${GATEWAY_PORT:3000}

spring:
  application:
    name: saep-gateway
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins: 
              - "http://localhost:5173"
              - "http://127.0.0.1:5173"
            allowed-methods:
              - "GET"
              - "POST"
              - "PUT"
              - "DELETE"
              - "OPTIONS"
              - "PATCH"
            allowed-headers: "*"
            allow-credentials: true
      routes:
        - id: saep-identity
          uri: ${IDENTITY_SERVICE_URL:http://localhost:${IDENTITY_PORT:3002}}
          predicates:
            - Path=/api/v1/auth/**
        - id: saep-company
          uri: ${COMPANY_SERVICE_URL:http://localhost:${COMPANY_PORT:8081}}
          predicates:
            - Path=/api/v1/companies/**
        - id: saep-organization
          uri: ${ORGANIZATION_SERVICE_URL:http://localhost:${ORGANIZATION_PORT:8084}}
          predicates:
            - Path=/api/v1/organizations/**
        - id: saep-workforce
          uri: ${WORKFORCE_SERVICE_URL:http://localhost:${WORKFORCE_PORT:8082}}
          predicates:
            - Path=/api/v1/workers/**
        - id: saep-marketplace
          uri: ${MARKETPLACE_SERVICE_URL:http://localhost:${MARKETPLACE_PORT:8085}}
          predicates:
            - Path=/api/v1/marketplace/**
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}
  lettuce:
    pool:
      max-active: 100
      max-idle: 50
      min-idle: 10
      max-wait: 2000ms

jwt:
  secret: ${JWT_SECRET:z+y9w1XfR/qj5H+c8V2P4mK7s9tL6bN3yQ1w8Z4c5vA=}
