openapi: 3.1.0
info:
  title: SAEP Milestone 1 API (Identity & Company)
  description: Concrete OpenAPI endpoints for Identity and Company services
  version: 1.0.0
servers:
  - url: http://localhost:8080/api/v1
tags:
  - name: Identity
  - name: Auth
  - name: Company
  - name: Department
paths:
  /auth/login:
    post:
      summary: Authenticate User
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Token Issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
  /auth/validate:
    get:
      summary: Validate Token
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token Valid
  /identities:
    post:
      summary: Create Identity
      tags: [Identity]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityCreate'
      responses:
        '201':
          description: Identity Created
  /companies:
    post:
      summary: Create Company
      tags: [Company]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreate'
      responses:
        '201':
          description: Company Created
    get:
      summary: List Companies
      tags: [Company]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
  /companies/{companyId}:
    get:
      summary: View Company
      tags: [Company]
      security:
        - bearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
  /companies/{companyId}/departments:
    post:
      summary: Create Department
      tags: [Department]
      security:
        - bearerAuth: []
      parameters:
        - name: companyId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentCreate'
      responses:
        '201':
          description: Department Created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TokenResponse:
      type: object
      properties:
        accessToken: { type: string }
        expiresIn: { type: integer }
    IdentityCreate:
      type: object
      properties:
        type: { type: string, enum: [HUMAN, SERVICE, PROFESSIONAL] }
        email: { type: string }
        role: { type: string }
    CompanyCreate:
      type: object
      properties:
        name: { type: string }
        tenantId: { type: string, format: uuid }
    Company:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        tenantId: { type: string, format: uuid }
        status: { type: string }
    DepartmentCreate:
      type: object
      properties:
        name: { type: string }
        parentId: { type: string, format: uuid }
