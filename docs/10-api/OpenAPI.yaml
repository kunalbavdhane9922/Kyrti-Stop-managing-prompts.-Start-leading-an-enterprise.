info:
title: Sovereign AI Enterprise Protocol (SAEP)
description: Platform API Contract
version: 1.0.0

servers: []


tags:

* name: Marketplace
* name: Company
* name: Memory
* name: Communication
* name: Governance

security:

* bearerAuth: []

paths:

/health:
get:
summary: Platform Health Check
tags:
- Marketplace
responses:
'200':
description: Platform Healthy

/version:
get:
summary: Platform Version
tags:
- Marketplace
responses:
'200':
description: Version Information

components:

securitySchemes:

```
bearerAuth:
  type: http
  scheme: bearer
  bearerFormat: JWT
```

parameters:

```
TenantId:
  name: X-Tenant-Id
  in: header
  required: true
  schema:
    type: string

CorrelationId:
  name: X-Correlation-Id
  in: header
  required: false
  schema:
    type: string
```

schemas:

```
ApiResponse:
  type: object
  properties:
    success:
      type: boolean

    data:
      type: object

    metadata:
      type: object

ErrorResponse:
  type: object
  properties:
    success:
      type: boolean
      example: false

    error:
      $ref: '#/components/schemas/Error'

Error:
  type: object
  properties:
    code:
      type: string

    message:
      type: string

    timestamp:
      type: string
      format: date-time

Pagination:
  type: object
  properties:
    page:
      type: integer

    size:
      type: integer

    total:
      type: integer

Company:
  type: object
  properties:
    id:
      type: string

    name:
      type: string

    status:
      type: string

Professional:
  type: object
  properties:
    id:
      type: string

    profession:
      type: string

    level:
      type: string

    status:
      type: string

Memory:
  type: object
  properties:
    id:
      type: string

    scope:
      type: string

    owner:
      type: string

GovernanceRecord:
  type: object
  properties:
    id:
      type: string

    type:
      type: string

    status:
      type: string

Event:
  type: object
  properties:
    eventId:
      type: string

    eventType:
      type: string

    timestamp:
      type: string
      format: date-time

Workflow:
  type: object
  properties:
    workflowId:
      type: string

    status:
      type: string

    createdAt:
      type: string
      format: date-time
```

