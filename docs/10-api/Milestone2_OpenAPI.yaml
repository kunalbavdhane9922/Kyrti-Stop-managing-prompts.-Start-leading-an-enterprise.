openapi: 3.1.0
info:
  title: SAEP Milestone 2 APIs (Marketplace & Governance)
  version: 1.0.0
  description: Concrete API definitions for the Marketplace and Governance domains in SAEP.

servers:
  - url: http://localhost:8083
    description: Local Marketplace Service
  - url: http://localhost:8084
    description: Local Governance Service

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdHeader:
      name: X-Tenant-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    Profession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        capabilities:
          type: array
          items:
            type: string
        status:
          type: string

    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        requiredApprovers:
          type: integer
        status:
          type: string

    ApprovalRequest:
      type: object
      properties:
        approved:
          type: boolean
        comments:
          type: string

security:
  - bearerAuth: []

paths:
  /api/v1/marketplace/professions:
    get:
      summary: List Digital Professions
      description: Returns a catalog of available Digital Professions that companies can hire.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: A list of professions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profession'

  /api/v1/governance/policies:
    post:
      summary: Define a Governance Policy
      description: Creates a new governance policy for the tenant.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Policy'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'

  /api/v1/governance/approvals/{id}/approve:
    post:
      summary: Approve or Reject a Workflow Action
      description: Human-in-the-loop approval mechanism.
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalRequest'
      responses:
        '200':
          description: Approval successfully recorded
