[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Reverse Proxy all API requests to the deployed backend gateway on Render
[[redirects]]
  from = "/api/*"
  to = "https://saep-gateway.onrender.com/api/:splat"
  status = 200
  force = true

# Single Page Application (SPA) routing fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
