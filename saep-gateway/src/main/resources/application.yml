server:
  port: ${GATEWAY_PORT:3000}

spring:
  application:
    name: saep-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173" # React frontend default
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: saep-identity
          uri: http://localhost:${IDENTITY_PORT:3002}
          predicates:
            - Path=/api/v1/auth/**
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:redispassword}
    lettuce:
      pool:
        max-active: 100
        max-idle: 50
        min-idle: 10
        max-wait: 2000ms

jwt:
  secret: ${JWT_SECRET:z+y9w1XfR/qj5H+c8V2P4mK7s9tL6bN3yQ1w8Z4c5vA=}
