version: '3.8'

services:
  # ==========================================
  # PostgreSQL (Transactional Data)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: saep-postgres
    environment:
      POSTGRES_USER: saep_user
      POSTGRES_PASSWORD: saep_password
      POSTGRES_DB: saep_identity  # We will let init scripts create other DBs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Mount initialization scripts to automatically create domain schemas
      - ./postgres-init/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saep_user -d saep_identity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Kafka & Zookeeper (Event Streaming)
  # ==========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: saep-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: saep-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  # ==========================================
  # Qdrant (Vector Database)
  # ==========================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: saep-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ==========================================
  # Neo4j (Knowledge Graph)
  # ==========================================
  neo4j:
    image: neo4j:5-community
    container_name: saep-neo4j
    environment:
      NEO4J_AUTH: neo4j/saep_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  # ==========================================
  # Temporal (Workflow Orchestration)
  # ==========================================
  elasticsearch:
    image: elasticsearch:7.16.2
    container_name: saep-elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    ports:
      - "9200:9200"

  temporal:
    image: temporalio/auto-setup:1.22.3
    container_name: saep-temporal
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=saep_user
      - POSTGRES_PWD=saep_password
      - POSTGRES_SEEDS=postgres
      - ENABLE_ES=true
      - ES_SEEDS=elasticsearch
      - ES_VERSION=v7

  temporal-ui:
    image: temporalio/ui:latest
    container_name: saep-temporal-ui
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000

  # ==========================================
  # Vault (Secrets Management)
  # ==========================================
  vault:
    image: hashicorp/vault:latest
    container_name: saep-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=saep_root_token
    cap_add:
      - IPC_LOCK

  # ==========================================
  # Ollama (Self-Hosted Inference)
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    container_name: saep-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: GPU support should be added if running on a GPU-enabled host
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ==========================================
  # AI Services (Python Scaffolding)
  # ==========================================
  ai-gateway:
    build:
      context: ../services/ai-services/ai-gateway
    container_name: saep-ai-gateway
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434

  agent-service:
    build:
      context: ../services/ai-services/agent-service
    container_name: saep-agent-service
    ports:
      - "8001:8001"
    depends_on:
      - ai-gateway
    environment:
      - AI_GATEWAY_URL=http://ai-gateway:8000

volumes:
  pgdata:
  qdrant_data:
  ollama_data:
  neo4j_data:
