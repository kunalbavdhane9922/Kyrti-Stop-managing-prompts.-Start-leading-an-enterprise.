server:
  port: ${IDENTITY_PORT:3002}

spring:
  application:
    name: saep-identity
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:saep_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}
      lettuce:
        pool:
          max-active: 100
          max-idle: 50
          min-idle: 10
          max-wait: 2000ms

jwt:
  secret: ${JWT_SECRET:z+y9w1XfR/qj5H+c8V2P4mK7s9tL6bN3yQ1w8Z4c5vA=}
  access:
    expirationMs: ${JWT_ACCESS_EXPIRATION_MS:900000}
  refresh:
    expirationMs: ${JWT_REFRESH_EXPIRATION_MS:604800000}

twofactor:
  encryptionKey: ${TWO_FACTOR_ENCRYPTION_KEY:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS0yNTZiaXQ=}
