server:
  port: 8081

spring:
  application:
    name: saep-company
  datasource:
    url: jdbc:postgresql://localhost:5432/saep_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

saep:
  test:
    force-producer-failure: false
  outbox:
    poll-interval-ms: 1000
    max-retries: 15

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}