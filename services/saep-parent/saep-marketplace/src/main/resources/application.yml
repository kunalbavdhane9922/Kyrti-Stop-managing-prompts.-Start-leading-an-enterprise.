server:
  port: 8083

spring:
  application:
    name: saep-marketplace
  datasource:
    url: jdbc:postgresql://localhost:5432/saep_marketplace
    username: saep_user
    password: saep_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

saep:
  security:
    jwt:
      secret: "saep-super-secret-key-for-development-only-must-be-changed-in-production"
