server:
  port: 8084

spring:
  application:
    name: saep-organization
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:saep_db}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: organization
  flyway:
    enabled: true
    table: org_flyway_history
    baseline-on-migrate: true
    baseline-version: 0
    schemas: organization
    create-schemas: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redispassword}
  kafka:
    bootstrap-servers: ${KAFKA_BROKER:localhost:9094}
    listener:
      delivery-attempt-header: true
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

saep:
  test:
    force-producer-failure: false
  outbox:
    poll-interval-ms: 1000
    max-retries: 15


logging:
  pattern:
    level: "%5p [${spring.application.name:}, traceId=%X{traceId:-}, spanId=%X{spanId:-}, tenantId=%X{tenantId:-}, companyId=%X{companyId:-}, correlationId=%X{correlationId:-}]"

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus,metrics"
  metrics:
    tags:
      application: ${spring.application.name}
