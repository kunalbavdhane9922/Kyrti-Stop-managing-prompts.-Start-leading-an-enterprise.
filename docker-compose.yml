services:
  # 1. PostgreSQL (Relational Database)
  postgres:
    image: postgres:15-alpine
    container_name: saep-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-saep_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - saep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d saep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Kafka (Event Streaming with KRaft)
  kafka:
    image: apache/kafka:latest
    container_name: saep-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - saep-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 3. Temporal (Workflow Orchestration)
  temporal:
    image: temporalio/auto-setup:1.22.0
    container_name: saep-temporal
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233" # Temporal gRPC
      - "8233:8233" # Temporal Web UI
    networks:
      - saep-network
    depends_on:
      postgres:
        condition: service_healthy

  # 4. Qdrant (Vector Database)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: saep-qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - saep-network

  # 5. Neo4j (Knowledge Graph)
  neo4j:
    image: neo4j:5.15.0
    container_name: saep-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt port
    volumes:
      - neo4j_data:/data
    networks:
      - saep-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 6. Ollama (Local AI Inference with NVIDIA GPU Support)
  ollama:
    image: ollama/ollama:latest
    container_name: saep-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - saep-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 7. Redis (In-Memory Datastore for Sessions, Rate Limiting, and JWT Blacklist)
  redis:
    image: redis:7-alpine
    container_name: saep-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword} --appendonly yes --maxmemory ${REDIS_MAXMEMORY:-1gb} --maxmemory-policy noeviction
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saep-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      retries: 5

  # 8. Zipkin (Distributed Tracing)
  zipkin:
    image: openzipkin/zipkin:latest
    container_name: saep-zipkin
    ports:
      - "9411:9411"
    networks:
      - saep-network

  # 9. Prometheus (Metrics Scraper)
  prometheus:
    image: prom/prometheus:latest
    container_name: saep-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - saep-network

  # 10. Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: saep-grafana
    ports:
      - "3030:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/saep_dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - saep-network
    depends_on:
      - prometheus

  # 11. Kafka Exporter
  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: saep-kafka-exporter
    command: ["--kafka.server=kafka:9092"]
    ports:
      - "9308:9308"
    networks:
      - saep-network
    depends_on:
      - kafka

  # 12. cAdvisor (Container Metrics)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: saep-cadvisor
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - saep-network

networks:
  saep-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  qdrant_data:
  neo4j_data:
  ollama_data:
  redis_data:
  prometheus_data:
  grafana_data:
