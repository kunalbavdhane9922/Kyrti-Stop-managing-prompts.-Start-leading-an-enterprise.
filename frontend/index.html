<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <script>
      window.__ERRORS = [];
      window.addEventListener('error', e => window.__ERRORS.push(e.message));
      window.addEventListener('unhandledrejection', e => window.__ERRORS.push(e.reason));
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
