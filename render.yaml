services:
  # 1. API Gateway Entry Point
  - type: web
    name: saep-gateway
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SERVICE_NAME
        value: saep-gateway
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: POSTGRES_HOST
        fromDatabase:
          name: saep-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: saep-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: saep-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: saep-postgres
          property: password
      - key: POSTGRES_DB
        value: saep_db

  # 2. Core Identity Microservice
  - type: web
    name: saep-identity
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SERVICE_NAME
        value: saep-identity
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: POSTGRES_HOST
        fromDatabase:
          name: saep-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: saep-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: saep-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: saep-postgres
          property: password
      - key: POSTGRES_DB
        value: saep_db

  # 3. Company & Hierarchy Microservice
  - type: web
    name: saep-company
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SERVICE_NAME
        value: saep-company
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: POSTGRES_HOST
        fromDatabase:
          name: saep-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: saep-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: saep-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: saep-postgres
          property: password
      - key: POSTGRES_DB
        value: saep_db

databases:
  - name: saep-postgres
    databaseName: saep_db
    user: saep_user
    plan: free
